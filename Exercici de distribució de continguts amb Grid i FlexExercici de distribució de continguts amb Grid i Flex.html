<!DOCTYPE html>
<html lang="ca"></html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercici de distribució de continguts amb Grid i Flex</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .item {
            background-color: #f0f0f0;
            padding: 20px;
            text-align: center;
            border: 1px solid #ccc;
        }
        .flex-container {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .flex-item {
            background-color: #d0d0d0;
            padding: 20px;
            text-align: center;
            border: 1px solid #aaa;
        }
    </style>
</head>
<body>
    <h1>Exercici de distribució de continguts amb Grid i Flex</h1>
    
    <h2>Utilitzant Grid</h2>
    <div class="container">
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
        <div class="item">Item 4</div>
        <div class="item">Item 5</div>
        <div class="item">Item 6</div>
    </div>
