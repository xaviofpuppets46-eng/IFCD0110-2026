<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PRUEBA FLEX</title>
        <style>
header, footer {
    background-color: #f0f0f0;
    padding: 20px;
    text-align: center;
}
main {
    display: flex;
    justify-content: space-around; /* Distribuye el espacio entre elementos */
    align-items: center;           /* Centra verticalmente */
    gap: 20px;
    min-height: 50vh;
    padding: 20px;
    background-color: #ffffff;
}

.caja {
    flex: 1;                       /* Hace que las cajas crezcan proporcionalmente */
    padding: 30px;
    text-align: center;
    border-radius: 8px;
    color: #333;
    font-weight: bold;
    transition: transform 0.3s ease;
}

.caja-primaria { background-color: #e0e0e0; }
.caja-secundaria { background-color: #d0d0d0; }

.caja:hover {
    transform: scale(1.05);        /* Efecto visual al pasar el ratón */
}
    </style>
</head>
<body>
    <header>
        <h1>Ejemplo Moderno de Flexbox</h1>
    </header>

    <main>
        <div class="caja caja-primaria">Contenido Principal</div>
        <div class="caja caja-secundaria">Contenido Secundario</div>
    </main>

    <footer>
        <p>&copy; 2023 PRUEBA FLEX. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
