<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exmplo de flex-direction</title>
    <style>
        /* Contenedor Exterior (Flex Padre) */
        .container {
            display: flex;
            flex-direction: row;
            justify-content: flex-start;
            align-items: center;
            min-height: 300px;
            background-color: #000000;
            margin-top: 30px;
            gap: 20px;
            padding: 10px;
        }

        /* Nuevo contenedor inline-flex para comparar */
        .container-inline {
            display: inline-flex;
            background-color: #000000;
            gap: 10px;
            padding: 10px;
            border: 2px dashed #000000;
        }

        /* Contenedor Interior (Flex Hijo) */
        .caixa {
            display: flex;
            flex-direction: column; /* Alinea su contenido en columna */
            justify-content: center; 
            align-items: center; 
            width: 150px;
            height: 150px;
            background-color: rgb(109, 253, 73);
            border-radius: 12px;
            color: #333;
            transition: all 0.3s ease;
            font-weight: bold;
            border: 2px solid #000000;
        }

        .caixa:hover {
            background-color: steelblue;
            color: white;
            transform: scale(1.1);
        }

        .caixa-amarilla {
            background-color: yellow;
        }

        .caixa-pistacho {
            background-color: #93C572; /* Color Verde Pistacho */
        }

        .caixa-azul-claro {
            background-color: #ADD8E6; /* Azul Claro */
        }

        .caixa-naranja-claro {
            background-color: #FFDAB9; /* Naranja Claro */
        }

        .caixa-morado-claro {
            background-color: #E6E6FA; /* Morado Claro (Lavender) */
        }

        @media (max-width: 600px) {
            .container {
                flex-direction: column;
                height: auto;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <h1>Ejemplo de Flex todo a la izquierda</h1>
    
    <div class="container">
        <div class="caixa caixa-amarilla">
            <span>Caja 1</span>
        </div>
        <div class="caixa caixa-pistacho">
            <span>Caja 2</span>
        </div>
        <div class="caixa caixa-azul-claro">
            <span>Caja 3</span>
        </div>
        <div class="caixa caixa-naranja-claro">
            <span>Caja 4</span>
        </div>
        <div class="caixa caixa-morado-claro">
            <span>Caja 5</span>
        </div>
    </div>
</body>
</html>
