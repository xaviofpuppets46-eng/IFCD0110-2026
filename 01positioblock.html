<!DOCTYPE html>
<html lang="es">
<head>
    <title>Posicionamiento cajas</title>
    <meta charset="UTF-8">
    <style>
        main {
            display: flex;       /* Activa Flexbox */
            flex-wrap: wrap;    /* Permite que las cajas bajen a la siguiente línea si no caben */
            gap: 10px;          /* Añade un espacio opcional entre las cajas */
            padding: 20px;
        }
        .caja1 {
            width: 300px;
            height: 300px;
            background-color: red;
        }
        .caja2 {
            width: 250px;
            height: 250px;
            background-color: blue;
        }
    </style>
</head>
<body>
    <header style="background-color:gray; color:white; text-align:center; padding:10px;">
        Posición de las cajas
    </header>

    <main>
        <div class="caja1">caja 1</div>
        <div class="caja2">caja 2</div>
        <div class="caja1">caja 3</div>
        <div class="caja2">caja 4</div>
    </main>

    <footer style="background-color:gray; color:white; text-align:center; padding:10px;">
        Esto funciona
    </footer>
</body>
</html>
